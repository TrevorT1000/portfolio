<style>
:root{
  --accent:#1E9FD9;      /* the theme's cyan-blue */
  --body-text:#6B6B6B;   /* soft grey body copy */
  --dark-text:#3A3A3A;
  --hairline:#EBEBEB;
  --caption:#8A8A8A;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}}
body{
  background:#fff;
  color:var(--body-text);
  font-family:'Open Sans', 'Helvetica Neue', Arial, sans-serif;
  font-size:16px;
  line-height:1.75;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px}

/* ---------- masthead: tagline left, title right (as original) ---------- */
.masthead{display:grid;grid-template-columns:230px 1fr;gap:40px;padding:70px 0 0}
.tagline{
  font-family:'PT Serif', Georgia, serif;font-style:italic;
  color:#8A8A8A;font-size:16px;line-height:1.7;padding-top:14px;
}
.site-title{
  font-family:'Oswald', 'Arial Narrow', sans-serif;font-weight:500;
  font-size:clamp(1.9rem,4.5vw,2.9rem);
  text-transform:uppercase;letter-spacing:.01em;
  color:var(--accent);line-height:1.15;
}
.site-title a{color:var(--accent)}
.site-title a:hover{text-decoration:none}

/* ---------- nav ---------- */
.main-nav{
  grid-column:2;
  border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline);
  margin-top:34px;padding:16px 0;
  display:flex;gap:28px;flex-wrap:wrap;
}
.main-nav a{font-size:16px;color:var(--accent)}
.main-nav a[aria-current="page"]{color:#B5B5B5;pointer-events:none}
.main-nav a:hover{text-decoration:none;color:#1580B3}

/* ---------- page views ---------- */
.view{display:none}
.view.active{display:block}
main{padding-bottom:30px}

/* ---------- post entries: meta rail left, content right ---------- */
article.post{
  display:grid;grid-template-columns:230px 1fr;gap:40px;
  padding:56px 0 26px;
}
article.post.hidden{display:none}
.meta{font-size:15px;line-height:2;padding-top:52px}
.meta .row{display:flex;gap:9px;align-items:flex-start}
.meta svg{width:16px;height:16px;flex:none;margin-top:7px;fill:#9a9a9a}
.meta a{color:var(--accent)}
.entry h2{
  font-family:'Oswald','Arial Narrow',sans-serif;font-weight:500;
  text-transform:uppercase;letter-spacing:.015em;
  color:var(--accent);font-size:1.55rem;line-height:1.25;
  margin-bottom:18px;
  text-shadow:1px 1px 0 rgba(255,255,255,.9), 2px 2px 0 rgba(30,159,217,.18);
}
.entry ul{margin:0 0 14px 20px}
.entry ul li{margin-bottom:9px}
.entry ul ul{margin-top:9px}
.entry p{margin-bottom:14px}
.entry figure{margin:6px 0 22px;text-align:center;max-width:600px}
.entry figure img{
  max-width:100%;height:auto;
  border:1px solid var(--hairline);padding:8px;background:#fff;
}
.entry figcaption{
  font-family:'PT Serif',Georgia,serif;font-style:italic;
  color:var(--caption);font-size:14.5px;margin-top:8px;
}
.entry .h3{font-weight:600;color:var(--dark-text);margin:18px 0 8px}
hr.post-sep{border:none;border-bottom:1px solid var(--hairline);margin:0}

/* ---------- static page content ---------- */
.page-body{display:grid;grid-template-columns:230px 1fr;gap:40px;padding:56px 0 26px}
.page-body .entry h2{margin-bottom:24px}
.page-body .entry strong{color:var(--dark-text);font-weight:600}
.page-body .entry .float-img{float:right;margin:0 0 18px 26px;max-width:360px}
@media (max-width:760px){.page-body .entry .float-img{float:none;margin:0 0 18px}}
.wp-button{
  display:inline-block;background:var(--accent);color:#fff;
  padding:10px 22px;border-radius:3px;font-size:15px;margin:6px 0 18px;
}
.wp-button:hover{background:#1580B3;text-decoration:none}

/* ---------- widgets footer area ---------- */
.widgets{
  display:grid;grid-template-columns:230px 1fr;gap:40px;
  padding:60px 0 20px;
}
.widgets .inner{grid-column:2}
.widget{margin-bottom:44px}
.widget h3{
  font-family:'Oswald','Arial Narrow',sans-serif;font-weight:500;
  text-transform:uppercase;color:var(--dark-text);
  font-size:1.05rem;letter-spacing:.06em;margin-bottom:14px;
}
.widget ul{list-style:none}
.widget ul li{padding:3px 0;border-bottom:none}
.widget ul a{color:var(--accent)}
.widget ul .cat-count{color:var(--body-text)}
.searchbox{display:flex;gap:8px;max-width:340px}
.searchbox input{
  flex:1;border:1px solid #ccc;border-radius:2px;
  padding:8px 10px;font:inherit;color:var(--dark-text);
}
.searchbox button{
  background:#F7F7F7;border:1px solid #ccc;border-radius:2px;
  padding:8px 16px;font:inherit;color:var(--dark-text);cursor:pointer;
}
.searchbox button:hover{background:#eee}
.filter-note{font-size:14px;margin:20px 0 0;display:none}
.filter-note.show{display:block}
.filter-note a{cursor:pointer}

footer.site-footer{
  border-top:1px solid var(--hairline);
  padding:26px 24px 44px;text-align:left;
  font-size:14.5px;color:#9a9a9a;
}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

/* ---------- responsive ---------- */
@media (max-width:760px){
  .masthead,article.post,.page-body,.widgets{grid-template-columns:1fr;gap:10px}
  .masthead{padding-top:40px}
  .main-nav{grid-column:1}
  .meta{padding-top:0;display:flex;gap:22px;flex-wrap:wrap}
  .meta .row{align-items:center}
  .meta svg{margin-top:0}
  .widgets .inner{grid-column:1}
  article.post{padding-top:40px}
}
</style>

    {
      "id": "TT-26",
      "title": "The Group's Usability Specifics",
      "date": "2011-07-22",
      "slug": "the-groups-usability-specifics-guidelines",
      "original_url": "https://trevorius.wordpress.com/2011/07/22/the-groups-usability-specifics-guidelines/",
      "categories": [
        "Usability"
      ],
      "organisation": "The Group",
      "images": [
        {
          "url": "media/the-group-logo.jpg",
          "caption": "The Group logo"
        }
      ],
      "downloads": [],
      "links": [],
      "body_points": [
        "My London employer, The Group, is a communications agency.",
        "The whole company including designers, account managers and project managers needed to have a good grasp of usability fundamentals.",
        "I provided a one hour presentation for all new employees.",
        "I also distributed a list of Usability Guidelines on a 10cm-wide strip that was blue-tacked to people's monitors, to one side of the screen.",
        "I wanted the guidelines to be as concrete, specific and easy to apply as possible. That is, they should be concrete things like “Put the site search function in the top right of the page”, rather than abstract things like “Use commonly understood concepts and metaphors, and present information in a natural and logical order”."
      ],
      "extended_content": {
        "heading": "The usability specifics I settled on were:",
        "items": [
          "1) Orwell's last writing rule: Orwell said the following about writing well (almost, it's slightly adapted) – “Break any of these rules sooner than create/design anything outright barbarous.” Nothing is set in stone. There will be situations where one or more of these rules should not be applied. But 9 times out of 10 they will.",
          "2) Indicate the user's current position in the site: Navigation should always be highlighted so that you can see where you are. Users don't want to feel lost. This gives them something to hang onto. Also, users may have come straight to an inside page via a search engine and they'll need to know where they are.",
          "3) Don't rely on breadcrumb navigation: Tests show that a lot of users never see breadcrumb trails. Some do, but a lot don't. Use them, they are helpful. But don't rely solely on them.",
          "4) Logo is home link: The organisation's logo in the top left of the screen should be a link to the home page. This is a standard convention. Most users expect it to work this way.",
          "5) Site search in top right: The site search should appear towards the top of the screen, and preferably on the right. Research by Shaik and Lenz shows that most users expect to see it there.",
          "6) Display search criteria along with results: When you're looking at the search results page, you want to see what you entered in earlier. Don't just show the results without also showing something like “You entered 'XYZ'” at the top. It means the user doesn't have to rely on their fallible memory and can also see if they made any typos.",
          "7) Indicate mandatory fields in forms: You should always be able to see which fields in a form are mandatory rather than have to guess.",
          "8) Confirm the password in a registration form: Don't allow the user to enter their password only once if their input is masked by asterisks as they type. If they make a mistake they can't tell, and they won't be able to login.",
          "9) Don't get developers to write error messages: Some developers write very well. But the developer also knows how the site is supposed to work and what it's supposed to do to an agonising level of detail. Best to get someone who's not so close to the project to do the wording for the messages.",
          "10) Don't convey info only with colour: This is really an accessibility rule but it often comes up in usability evaluations. Colour can be used to reinforce information but shouldn't be the only means by which it is conveyed. Users with colour blindness will not be able to see the information.",
          "11) Use terms consistently: If you use a term to describe something, always use that same term. This applies to content but also to navigation – if you click on an item you should go to a page that has the same heading as the thing you clicked on."
        ]
      }
    },

<script>
const DATA = JSON.parse(document.getElementById('site-data').textContent);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const CAL_ICON = '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 0v2H2a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1h-2V0h-2v2H6V0H4zM3 6h10v7H3V6z"/></svg>';
const CAT_ICON = '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1 3a1 1 0 0 1 1-1h4l2 2h6a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V3z"/></svg>';

function fmtDate(d){
  const [y,m,day] = d.split('-');
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return months[+m-1] + ' ' + (+day) + ', ' + y;
}

/* ---------- posts ---------- */
function postHTML(p){
  let h = `<article class="post" data-cats="${esc(p.categories.join('|'))}" data-text="${esc((p.title+' '+p.organisation+' '+p.body_points.join(' ')).toLowerCase())}">`;
  h += `<aside class="meta">
    <div class="row">${CAL_ICON}<a href="#home">${fmtDate(p.date)}</a></div>
    <div class="row">${CAT_ICON}<span>${p.categories.map(c=>`<a href="#home" data-cat="${esc(c)}">${esc(c)}</a>`).join(', ')}</span></div>
  </aside>`;
  h += `<div class="entry"><h2>${esc(p.title)}</h2>`;
  for (const im of p.images.slice(0,1)) {
    h += `<figure><img src="${im.url}" alt="${esc(im.caption||p.title)}" loading="lazy">`;
    if (im.caption) h += `<figcaption>${esc(im.caption)}</figcaption>`;
    h += `</figure>`;
  }
  if (p.body_points.length) h += '<ul>' + p.body_points.map(b=>`<li>${esc(b)}</li>`).join('') + '</ul>';
  if (p.extended_content) {
    const ec = p.extended_content;
    h += `<p class="h3">${esc(ec.heading)}</p><ul>` + ec.items.map(i=>`<li>${esc(i)}</li>`).join('') + '</ul>';
    if (ec.heading2) h += `<p class="h3">${esc(ec.heading2)}</p><ul>` + ec.items2.map(i=>`<li>${esc(i)}</li>`).join('') + '</ul>';
  }
  const extras = [];
  for (const dl of p.downloads) extras.push(`<li>Download: <a href="${dl.url}">${esc(dl.label)}</a></li>`);
  for (const lk of p.links) extras.push(`<li>See <a href="${lk.url}" rel="noopener">${esc(lk.label)}</a></li>`);
  if (extras.length) h += `<ul>${extras.join('')}</ul>`;
  h += `</div></article><hr class="post-sep">`;
  return h;
}
document.getElementById('posts').innerHTML = DATA.posts.map(postHTML).join('');

/* ---------- categories widget ---------- */
const catList = document.getElementById('cat-list');
catList.innerHTML = Object.entries(DATA.site.categories)
  .map(([c,n])=>`<li><a href="#home" data-cat="${esc(c)}">${esc(c)}</a> <span class="cat-count">(${n})</span></li>`).join('');

/* ---------- filtering (category + search) ---------- */
const note = document.getElementById('filter-note');
let activeCat = null, term = '';
function applyFilter(){
  let shown = 0;
  document.querySelectorAll('article.post').forEach(a=>{
    const okCat = !activeCat || a.dataset.cats.split('|').includes(activeCat);
    const okTerm = !term || a.dataset.text.includes(term);
    const show = okCat && okTerm;
    a.classList.toggle('hidden', !show);
    a.nextElementSibling.style.display = show ? '' : 'none';
    if (show) shown++;
  });
  if (activeCat || term) {
    let bits = [];
    if (activeCat) bits.push(`category “${activeCat}”`);
    if (term) bits.push(`search “${term}”`);
    note.innerHTML = `Showing ${shown} posts for ${bits.join(' and ')}. <a id="clear-filter">Show all posts</a>`;
    note.classList.add('show');
    document.getElementById('clear-filter').addEventListener('click', ()=>{
      activeCat = null; term = ''; document.getElementById('search-input').value=''; applyFilter();
    });
  } else note.classList.remove('show');
}
document.addEventListener('click', e=>{
  const cat = e.target.closest('[data-cat]');
  if (cat) { activeCat = cat.dataset.cat; showView('home'); applyFilter(); }
});
function runSearch(){
  term = document.getElementById('search-input').value.trim().toLowerCase();
  showView('home'); applyFilter();
  document.querySelector('main').scrollIntoView();
}
document.getElementById('search-btn').addEventListener('click', runSearch);
document.getElementById('search-input').addEventListener('keydown', e=>{ if(e.key==='Enter') runSearch(); });

/* ---------- static pages ---------- */
const about = DATA.pages.find(p=>p.id==='PAGE-ABOUT');
const ac = about.content;
document.getElementById('view-about').innerHTML = `
<div class="page-body">
  <aside class="meta"></aside>

    <h2>About Me</h2>
    <figure class="float-img"><img src="${about.images[0].url}" alt="${esc(about.images[0].caption)}" loading="lazy"><figcaption>${esc(about.images[0].caption)}</figcaption></figure>
    <p><strong>The Essentials</strong></p>
    <p>${esc(ac.essentials)}</p>
    <p><strong>Education</strong></p>
    <ul>${ac.education.map(e=>`<li>${esc(e)}</li>`).join('')}</ul>
    <p>${esc(ac.inspirations_intro)}</p>
    <figure class="float-img"><img src="${about.images[1].url}" alt="${esc(about.images[1].caption)}" loading="lazy"><figcaption>${esc(about.images[1].caption)}</figcaption></figure>
    <ul>${ac.inspirations.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
    <p>${esc(ac.fun)}</p>
    <ul>${ac.links.map(l=>`<li><a href="${l.url}" rel="noopener">${esc(l.label)}</a></li>`).join('')}</ul>
  </div>
</div>`;

const cv = DATA.pages.find(p=>p.id==='PAGE-CV');
document.getElementById('view-cv').innerHTML = `
<div class="page-body">
  <aside class="meta"></aside>
  <div class="entry">
    <h2>My CV</h2>
    <p>${esc(cv.content.text)}</p>
    <a class="wp-button" href="${cv.content.downloads[0].url}">Download my CV (PDF)</a>
    <figure><img src="${cv.images[0].url}" alt="My CV at a glance" loading="lazy"><figcaption>${esc(cv.images[0].caption)}</figcaption></figure>
  </div>
</div>`;

const other = DATA.pages.find(p=>p.id==='PAGE-OTHER');
document.getElementById('view-other').innerHTML = `
<div class="page-body">
  <aside class="meta"></aside>
  <div class="entry">
    <h2>Other Activities</h2>
    ${other.content.sections.map(s=>`
      <p><strong>${esc(s.heading)}</strong></p>
      <p>${esc(s.text)}${s.link?` <a href="${s.link.url}" rel="noopener">${esc(s.link.label)}</a>`:''}</p>`).join('')}
  </div>
</div>`;

/* ---------- view switching (mimics the original's pages) ---------- */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+name));
  document.querySelectorAll('[data-nav]').forEach(a=>{
    if (a.closest('.main-nav')) a.setAttribute('aria-current', a.dataset.nav===name ? 'page' : 'false');
  });
  if (location.hash !== '#'+name) history.replaceState(null,'','#'+name);
  window.scrollTo({top:0});
}
document.querySelectorAll('[data-nav]').forEach(a=>{
  a.addEventListener('click', e=>{ e.preventDefault(); showView(a.dataset.nav); });
});
const initial = (location.hash||'#home').slice(1);
showView(['home','about','cv','other'].includes(initial) ? initial : 'home');
</script>
